    let currentCategory = 'news';
    let debounceTimer = null;

    function init() {
      renderStats();
      renderNavTabs();
      handleHashChange();
      setupSearch();
      setupBackToTop();
      window.addEventListener('hashchange', handleHashChange);
    }

    function renderStats() {
      document.getElementById('totalLinks').textContent = getTotalLinkCount();
      document.getElementById('totalCategories').textContent = siteData.categories.length;
    }

    function getIcon(iconName) {
      return iconSVGs[iconName] || iconSVGs.default;
    }

    function getTagIcon(tagName) {
      const iconKey = tagIcons[tagName] || 'tag';
      return `<span class="tag-icon">${getIcon(iconKey)}</span>`;
    }

    function renderNavTabs() {
      const navTabs = document.getElementById('navTabs');
      let html = '';

      siteData.categories.forEach(cat => {
        const count = getCategoryLinkCount(cat.id);
        const isActive = cat.id === 'tags' ? ' active' : '';
        html += `<div class="nav-tab${isActive}" data-category="${cat.id}"><span class="nav-icon">${getIcon(cat.icon)}</span>${cat.name}<span class="count">${count}</span></div>`;
      });

      navTabs.innerHTML = html;
    }

    function handleHashChange() {
      const hash = window.location.hash.slice(1);
      const navTabs = document.getElementById('navTabs');

      if (!hash || hash === 'news') {
        currentCategory = 'news';
        setActiveTab(navTabs, 'news');
        renderCategory('news');
        return;
      }

      if (hash === 'all') {
        currentCategory = 'all';
        setActiveTab(navTabs, 'tags');
        renderAllCategories();
        return;
      }

      if (hash === 'tags') {
        currentCategory = 'tags';
        setActiveTab(navTabs, 'tags');
        renderTagsPage();
        return;
      }

      if (hash.startsWith('tag-')) {
        currentCategory = 'tags';
        setActiveTab(navTabs, 'tags');
        const tagName = decodeURIComponent(hash.replace('tag-', ''));
        renderTagLinks(tagName);
        return;
      }

      const targetTab = navTabs.querySelector(`[data-category="${hash}"]`);
      if (targetTab) {
        currentCategory = hash;
        setActiveTab(navTabs, hash);
        renderCategory(hash);
      } else if (hash !== 'search') {
        renderCategory('news');
      }
    }

    function setActiveTab(navTabs, categoryId) {
      navTabs.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      const targetTab = navTabs.querySelector(`[data-category="${categoryId}"]`);
      if (targetTab) targetTab.classList.add('active');
    }

    function renderAllCategories() {
      const contentArea = document.getElementById('contentArea');
      const noResults = document.getElementById('noResults');
      contentArea.style.display = 'block';
      noResults.style.display = 'none';

      const categories = siteData.categories.filter(cat => cat.id !== 'tags');
      const html = categories.map(cat => {
        const links = getLinksByCategory(cat.id);
        return links.length > 0 ? renderCategorySection(cat, links) : '';
      }).join('');

      contentArea.innerHTML = html;
    }

    function renderCategory(categoryId) {
      const contentArea = document.getElementById('contentArea');
      const noResults = document.getElementById('noResults');
      const category = siteData.categories.find(c => c.id === categoryId);

      if (!category) return;

      const links = getLinksByCategory(categoryId);

      if (links.length === 0) {
        contentArea.style.display = 'none';
        noResults.style.display = 'block';
        return;
      }

      contentArea.style.display = 'block';
      noResults.style.display = 'none';
      contentArea.innerHTML = renderCategorySection(category, links);

      setTimeout(() => {
        const section = document.getElementById(categoryId);
        if (section) {
          const headerHeight = document.querySelector('.header').offsetHeight + document.querySelector('.nav-tabs').offsetHeight + 20;
          window.scrollTo({ top: section.offsetTop - headerHeight, behavior: 'smooth' });
        }
      }, 100);
    }

    function renderTagsPage() {
      const contentArea = document.getElementById('contentArea');
      const noResults = document.getElementById('noResults');
      contentArea.style.display = 'block';
      noResults.style.display = 'none';

      const tags = getAllTags();
      const maxCount = tags.length > 0 ? Math.max(...tags.map(t => t.count)) : 1;

      const html = `
        <section class="category-section" id="tags">
          <div class="category-header">
            <div class="category-icon icon-tags">${getIcon('tag')}</div>
            <div class="category-info">
              <h2>全部标签</h2>
              <p>点击标签查看所有相关外链</p>
            </div>
            <span class="category-count">${tags.length} 个标签</span>
          </div>
          <div class="tags-cloud">
            ${tags.map(tag => {
              const sizeClass = tag.count > maxCount * 0.7 ? 'tag-large' : tag.count > maxCount * 0.3 ? 'tag-medium' : 'tag-small';
              return `<a href="#tag-${encodeURIComponent(tag.name)}" class="tag-item ${sizeClass}" data-tag="${tag.name}">${getTagIcon(tag.name)}${tag.name}<span class="tag-count">${tag.count}</span></a>`;
            }).join('')}
          </div>
        </section>
      `;

      contentArea.innerHTML = html;
    }

    function renderTagLinks(tagName) {
      const contentArea = document.getElementById('contentArea');
      const noResults = document.getElementById('noResults');
      const links = getLinksByTag(tagName);

      if (links.length === 0) {
        contentArea.style.display = 'none';
        noResults.style.display = 'block';
        return;
      }

      contentArea.style.display = 'block';
      noResults.style.display = 'none';

      const html = `
        <section class="category-section" id="tag-${tagName}">
          <div class="category-header">
            <a href="#tags" class="back-link">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15 18 9 12 15 6"></polyline></svg>
              返回标签
            </a>
          </div>
          <div class="category-header" style="margin-top: 10px;">
            <div class="category-icon icon-tags">${getIcon('tag')}</div>
            <div class="category-info">
              <h2>标签：${tagName}</h2>
              <p>包含 ${links.length} 个相关外链</p>
            </div>
          </div>
          <div class="links-grid">
            ${links.map(link => renderLinkCard(link)).join('')}
          </div>
        </section>
      `;

      contentArea.innerHTML = html;
    }

    function renderCategorySection(category, links) {
      return `
        <section class="category-section" id="${category.id}">
          <div class="category-header">
            <div class="category-icon icon-${category.id}">${getIcon(category.icon)}</div>
            <div class="category-info">
              <h2>${category.name}</h2>
              <p>${category.description}</p>
            </div>
            <span class="category-count">${links.length} 个站点</span>
          </div>
          <div class="links-grid">
            ${links.map(link => renderLinkCard(link)).join('')}
          </div>
        </section>
      `;
    }

    function renderLinkCard(link) {
      const icon = getIcon(link.category) || iconSVGs.default;
      const tagsHtml = link.tags.slice(0, 3).map(tag => `<span class="tag">${tag}</span>`).join('');

      return `
        <a href="${link.url}" target="_blank" rel="noopener noreferrer" class="link-card ${link.recommended ? 'recommended' : ''}">
          <div class="link-card-header">
            <div class="link-favicon">${icon}</div>
            <div class="link-info">
              <div class="link-name">${link.name}</div>
              <div class="link-region">${link.region}</div>
            </div>
          </div>
          <div class="link-description">${link.description}</div>
          <div class="link-tags">${tagsHtml}</div>
        </a>
      `;
    }

    function setupSearch() {
      const searchInput = document.getElementById('searchInput');

      searchInput.addEventListener('input', (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          const keyword = e.target.value.trim();
          keyword ? (window.location.hash = 'search', searchAndDisplay(keyword)) : handleHashChange();
        }, 300);
      });

      searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          clearTimeout(debounceTimer);
          const keyword = e.target.value.trim();
          keyword ? (window.location.hash = 'search', searchAndDisplay(keyword)) : handleHashChange();
        }
      });
    }

    function searchAndDisplay(keyword) {
      const results = searchLinks(keyword);
      const contentArea = document.getElementById('contentArea');
      const noResults = document.getElementById('noResults');

      if (results.length === 0) {
        contentArea.style.display = 'none';
        noResults.style.display = 'block';
        return;
      }

      contentArea.style.display = 'block';
      noResults.style.display = 'none';

      const groupedResults = {};
      results.forEach(link => {
        if (!groupedResults[link.category]) groupedResults[link.category] = [];
        groupedResults[link.category].push(link);
      });

      const html = Object.keys(groupedResults).map(categoryId => {
        const category = siteData.categories.find(c => c.id === categoryId);
        return category ? renderCategorySection(category, groupedResults[categoryId]) : '';
      }).join('');

      contentArea.innerHTML = html;
    }

    function setupBackToTop() {
      const backToTopBtn = document.getElementById('backToTop');

      window.addEventListener('scroll', () => {
        backToTopBtn.classList.toggle('visible', window.scrollY > 400);
      }, { passive: true });

      backToTopBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }

    document.getElementById('navTabs').addEventListener('click', (e) => {
      const tab = e.target.closest('.nav-tab');
      if (!tab) return;

      const category = tab.dataset.category;
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentCategory = category;
      window.location.hash = category;
    });

    document.getElementById('contentArea').addEventListener('click', (e) => {
      const tagItem = e.target.closest('.tag-item');
      if (tagItem) {
        e.preventDefault();
        window.location.hash = `tag-${encodeURIComponent(tagItem.dataset.tag)}`;
      }
    });

    document.addEventListener('DOMContentLoaded', init);
  </script>
